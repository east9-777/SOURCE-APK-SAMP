name: Build SAMP APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório (com LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Baixar arquivos LFS
        run: git lfs pull

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar NDK e CMake
        run: |
          sdkmanager "ndk;26.2.11394342" "cmake;3.22.1"

      - name: Dar permissão ao gradlew
        working-directory: "source/Codigo Fonte Apk"
        run: chmod +x gradlew

      - name: Compilar APK Release
        working-directory: "source/Codigo Fonte Apk"
        run: ./gradlew assembleRelease

      - name: Salvar APK gerado
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: "source/Codigo Fonte Apk/app/build/outputs/apk/release/app-release.apk"
